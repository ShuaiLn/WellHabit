<div class="habit-modal-overlay" id="habit-modal-overlay" hidden>
    <div class="habit-modal-card">
        <p class="eyebrow" id="habit-modal-eyebrow">Goal-Based Hydration Reminder</p>
        <h2 id="habit-modal-title">Drink a glass of water to begin the day.</h2>
        <p class="muted" id="habit-modal-message">Choose what you want to drink, type an amount, then tell WellHabit whether you finished it.</p>

        <div class="hydration-choice-grid">
            <label>Beverage
                <select id="hydration-beverage">
                    <option value="water">Water</option>
                    <option value="milk">Milk</option>
                    <option value="coke">Coke</option>
                    <option value="other">Other</option>
                </select>
            </label>
            <label>Amount
                <input type="text" id="hydration-amount" placeholder="300 ml / a glass / 2 bottles / three cups">
            </label>
            <label id="hydration-custom-wrap" hidden>Type
                <input type="text" id="hydration-custom" placeholder="Write your drink name">
            </label>
        </div>

        <div class="modal-actions big-modal-actions">
            <button class="btn primary" type="button" id="hydration-finished-btn">Finished</button>
            <button class="btn secondary" type="button" id="hydration-not-yet-btn">Not Yet</button>
            <button class="btn danger" type="button" id="hydration-skip-btn">No Thanks</button>
        </div>
    </div>
</div>
