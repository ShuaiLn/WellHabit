<div class="dashboard-care-panel">
    <div class="section-title-row dashboard-care-context-head">
        <div class="dashboard-care-title-copy">
            <p class="eyebrow">Care AI</p>
            <h2>AI Check-in</h2>
            <p class="muted small">How are you feeling today?</p>
        </div>
        <details class="details-block care-boundary-callout">
            <summary>Limits</summary>
            <div class="details-content">
                <ul class="care-boundary-list">
                    <li>Habit support only, not therapy. Scores are behavioral estimates.</li>
                    {% for line in care_boundary_lines %}<li>{{ line }}</li>{% endfor %}
                </ul>
            </div>
        </details>
    </div>

    <div class="care-summary-row dashboard-care-summary-row" aria-label="Care AI score overview">
        {% for metric in wellness_metrics %}
            <article class="metric dashboard-care-metric">
                <strong>{{ metric.value }}</strong>
                <span>{{ metric.label }}</span>
            </article>
        {% endfor %}
    </div>

    <section class="care-chat-card dashboard-care-chat-card" aria-label="Care AI conversation">
        <div class="care-chat-window">
            <div class="care-messages-frame">
                <div class="care-messages" id="home-care-messages"></div>
            </div>

            <div class="care-quick-strip" aria-label="Quick mood prompts">
                <button class="btn btn-ghost btn-sm care-quick-btn" type="button" data-prompt="I feel exhausted and I do not know where to start.">Exhausted</button>
                <button class="btn btn-ghost btn-sm care-quick-btn" type="button" data-prompt="I feel anxious and I need help calming down.">Anxious</button>
                <button class="btn btn-ghost btn-sm care-quick-btn" type="button" data-prompt="I feel happy and I want to keep this feeling steady.">Happy</button>
                <button class="btn btn-ghost btn-sm care-quick-btn" type="button" data-prompt="Please help me slow down and take one small next step.">Pause</button>
            </div>

            <form class="care-composer" id="home-care-form">
                <label class="care-composer-box">
                    <span class="care-input-label">Your message</span>
                    <textarea id="home-care-input" rows="2" placeholder="Start anywhere. You can talk about tiredness, anxiety, happiness, or stress."></textarea>
                </label>
                <div class="care-input-actions">
                    <p class="muted small" id="home-care-status-line" aria-live="polite"></p>
                    <div class="care-send-actions">
                        <button class="btn btn-secondary" type="button" id="home-care-end-btn">End</button>
                        <button class="btn btn-primary" type="submit" id="home-care-send-btn">Send</button>
                    </div>
                </div>
            </form>
        </div>
    </section>
</div>
